services:

  app:
    build: .
    container_name: mini-ai-agent-app

    ports:
      - "5000:5000"

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ai_support_agent
      GEMINI_API_KEY: ${GEMINI_API_KEY}

    restart: unless-stopped

  mysql:
    image: mysql:8.0

    container_name: mini-ai-agent-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_support_agent

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data: